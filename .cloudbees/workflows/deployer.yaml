apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deployer

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      manifest:
        type: string
        required: true

jobs:
  fitness-planner-dnarlakanti_fitness-planner:
    if: ${{ fromJSON(inputs.manifest)['fitness-planner']['dnarlakanti/fitness-planner'].deploy }}
    uses: dnarlakanti-IN-297/fitness-planner/.cloudbees/workflows/deploy.yaml
    with:
      artifact-id: ${{ fromJSON(inputs.manifest)['fitness-planner']['dnarlakanti/fitness-planner'].id }}
      environment: ${{ inputs.environment }}
    secrets: inherit
    vars: inherit
  fitness-planner-docker_io_dnarlakanti_fitness-planner:
    if: ${{ fromJSON(inputs.manifest)['fitness-planner']['docker.io/dnarlakanti/fitness-planner'].deploy }}
    uses: dnarlakanti-IN-297/fitness-planner/.cloudbees/workflows/deploy.yaml
    with:
      artifact-id: ${{ fromJSON(inputs.manifest)['fitness-planner']['docker.io/dnarlakanti/fitness-planner'].id }}
      environment: ${{ inputs.environment }}
    secrets: inherit
    vars: inherit
